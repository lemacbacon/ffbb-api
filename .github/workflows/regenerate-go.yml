name: Regenerate Go Client

on:
  push:
    branches: [main]
    paths:
      - openapi.yaml

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod

      - name: Generate client
        run: make generate-go

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet go/client/client.gen.go; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/regenerate-go-client
          commit-message: "chore: regenerate Go client from openapi.yaml"
          title: "chore: regenerate Go client"
          body: |
            Auto-generated by [regenerate-go.yml](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            Updates the Go client to match the latest `openapi.yaml` changes.
          labels: automated
