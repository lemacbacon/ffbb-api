name: Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  checks: read
  workflows: write

jobs:
  auto-merge:
    if: github.actor == 'github-actions[bot]' || github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for checks to pass
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr checks "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --watch --fail-fast

      - name: Merge pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --squash --delete-branch
