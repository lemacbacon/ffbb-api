name: CI

on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      openapi: ${{ steps.changes.outputs.openapi }}
      yamls: ${{ steps.changes.outputs.yamls }}
      workflows: ${{ steps.changes.outputs.workflows }}
      go: ${{ steps.changes.outputs.go }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            openapi:
              - openapi.yaml
            yamls:
              - "**/*.y*ml"
            workflows:
              - ".github/workflows/*.y*ml"
            go:
              - openapi.yaml
              - "go/**"

  lint-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6

  lint-openapi:
    needs: changes
    if: needs.changes.outputs.openapi == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Lint OpenAPI spec
        run: make lint-openapi

  lint-yamls:
    needs: changes
    if: needs.changes.outputs.yamls == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run yamllint
        run: make lint-yamls

  lint-workflows:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
      - name: Lint GitHub Actions workflows
        run: make lint-workflows

  verify-go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
      - name: Generate client
        run: make generate-go
      - name: Verify generated client is up to date
        run: git diff --exit-code go/client/client.gen.go
      - name: Verify go.mod is tidy
        run: cd go && go mod tidy && git diff --exit-code go/go.mod go/go.sum
      - name: Build
        run: cd go && go build ./...
