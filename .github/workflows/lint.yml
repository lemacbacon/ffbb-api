name: Lint

on:
  push:
    branches: [main]
    paths:
      - openapi.yaml
      - '.github/workflows/**'
  pull_request:
    paths:
      - openapi.yaml
      - '.github/workflows/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Lint OpenAPI spec
        run: make lint

  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        run: make lint-workflows
