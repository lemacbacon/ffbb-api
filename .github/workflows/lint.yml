name: Lint

on:
  push:
    branches: [main]
    paths:
      - openapi.yaml
  pull_request:
    paths:
      - openapi.yaml

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Lint OpenAPI spec
        run: make lint
