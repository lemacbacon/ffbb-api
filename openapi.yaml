    # ── Meilisearch ──
    MultiSearchRequest:
      type: object
      required: [queries]
      properties:
        queries:
          type: array
          items:
            $ref: '#/components/schemas/SearchQuery'

    SearchQuery:
      type: object
      required: [indexUid]
      properties:
        indexUid:
          type: string
          description: |
            Index Meilisearch à interroger.
            Valeurs possibles : ffbbserver_organismes, ffbbserver_rencontres, ffbbserver_terrains,
            ffbbserver_salles, ffbbserver_tournois, ffbbserver_competitions, ffbbnational_pratiques.
          enum:
            - ffbbserver_organismes
            - ffbbserver_rencontres
            - ffbbserver_terrains
            - ffbbserver_salles
            - ffbbserver_tournois
            - ffbbserver_competitions
            - ffbbnational_pratiques
        q:
          type: string
          description: Terme de recherche
        facets:
          type: array
          items:
            type: string
          description: Facettes à calculer
        limit:
          type: integer
          default: 10
        offset:
          type: integer
          default: 0
        filter:
          type: array
          items: {}
          description: Filtres Meilisearch
        sort:
          type: array
          items:
            type: string
          description: Critères de tri

    MultiSearchResult:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'

    SearchResult:
      type: object
      properties:
        indexUid:
          type: string
        hits:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/OrganismesHit'
              - $ref: '#/components/schemas/RencontresHit'
              - $ref: '#/components/schemas/CompetitionsHit'
              - $ref: '#/components/schemas/SallesHit'
              - $ref: '#/components/schemas/TerrainsHit'
              - $ref: '#/components/schemas/TournoisHit'
              - $ref: '#/components/schemas/PratiquesHit'
        query:
          type: string
        processingTimeMs:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        estimatedTotalHits:
          type: integer
        facetDistribution:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: integer
        facetStats:
          type: object
          additionalProperties: {}

