openapi: 3.0.3
info:
  title: FFBB API
  description: |
    API de la Fédération Française de Basketball (FFBB).
    Combine l'API Directus principale (api.ffbb.app) et le moteur de recherche Meilisearch (meilisearch-prod.ffbb.app).
  version: 1.0.0

servers:
  - url: https://api.ffbb.app
    description: API FFBB principale (Directus)
  - url: https://meilisearch-prod.ffbb.app
    description: Meilisearch FFBB (recherche full-text)

security:
  - bearerAuth: []

paths:
  # ──────────────────────────────────────────────
  # API FFBB - Configuration
  # ──────────────────────────────────────────────
  /items/configuration:
    get:
      operationId: getConfiguration
      summary: Récupérer la configuration (tokens)
      description: |
        Retourne la configuration de l'API, y compris les tokens d'authentification
        (key_dh pour l'API principale, key_ms pour Meilisearch).
      tags: [Configuration]
      security: []
      responses:
        '200':
          description: Configuration récupérée avec succès
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Configuration'

  # ──────────────────────────────────────────────
  # API FFBB - Compétitions
  # ──────────────────────────────────────────────
  /items/ffbbserver_competitions:
    get:
      operationId: listCompetitions
      summary: Lister les compétitions
      tags: [Competitions]
      parameters:
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Filter'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Liste de compétitions
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Competition'

  /items/ffbbserver_competitions/{id}:
    get:
      operationId: getCompetition
      summary: Détail d'une compétition
      tags: [Competitions]
      parameters:
        - $ref: '#/components/parameters/ItemId'
        - $ref: '#/components/parameters/Fields'
        - name: deep[phases][poules][rencontres][_limit]
          in: query
          description: Limite pour les rencontres imbriquées dans les poules des phases
          schema:
            type: string
            default: '1000'
      responses:
        '200':
          description: Détail de la compétition
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Competition'

  # ──────────────────────────────────────────────
  # API FFBB - Poules
  # ──────────────────────────────────────────────
  /items/ffbbserver_poules/{id}:
    get:
      operationId: getPoule
      summary: Détail d'une poule
      tags: [Poules]
      parameters:
        - $ref: '#/components/parameters/ItemId'
        - $ref: '#/components/parameters/Fields'
        - name: deep[rencontres][_limit]
          in: query
          description: Limite pour les rencontres imbriquées
          schema:
            type: string
            default: '1000'
        - name: deep[classements][_limit]
          in: query
          description: Limite pour les classements imbriqués
          schema:
            type: string
            default: '1000'
      responses:
        '200':
          description: Détail de la poule
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Poule'

  # ──────────────────────────────────────────────
  # API FFBB - Saisons
  # ──────────────────────────────────────────────
  /items/ffbbserver_saisons:
    get:
      operationId: listSaisons
      summary: Lister les saisons
      tags: [Saisons]
      parameters:
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Liste des saisons
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Saison'

  # ──────────────────────────────────────────────
  # API FFBB - Organismes
  # ──────────────────────────────────────────────
  /items/ffbbserver_organismes/{id}:
    get:
      operationId: getOrganisme
      summary: Détail d'un organisme (club, comité, ligue...)
      tags: [Organismes]
      parameters:
        - $ref: '#/components/parameters/ItemId'
        - $ref: '#/components/parameters/Fields'
      responses:
        '200':
          description: Détail de l'organisme
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Organisme'

  # ──────────────────────────────────────────────
  # API FFBB - Lives
  # ──────────────────────────────────────────────
  /json/lives.json:
    get:
      operationId: getLives
      summary: Matchs en direct
      description: Retourne la liste des matchs actuellement en direct avec les scores temps réel.
      tags: [Lives]
      responses:
        '200':
          description: Liste des matchs en direct
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Live'

  # ──────────────────────────────────────────────
  # Meilisearch - Multi-search
  # ──────────────────────────────────────────────
  /multi-search:
    post:
      operationId: multiSearch
      summary: Recherche multi-index Meilisearch
      description: |
        Effectue une recherche simultanée sur plusieurs index Meilisearch.
        Index disponibles : ffbbserver_organismes, ffbbserver_rencontres, ffbbserver_terrains,
        ffbbserver_salles, ffbbserver_tournois, ffbbserver_competitions, ffbbnational_pratiques.
      tags: [Search]
      servers:
        - url: https://meilisearch-prod.ffbb.app
          description: Meilisearch FFBB
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiSearchRequest'
      responses:
        '200':
          description: Résultats de recherche
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultiSearchResult'

components:
  # ──────────────────────────────────────────────
  # Security Schemes
  # ──────────────────────────────────────────────
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Token Bearer pour l'API FFBB (key_dh) ou Meilisearch (key_ms).
        Les tokens peuvent être récupérés via GET /items/configuration.

  # ──────────────────────────────────────────────
  # Parameters
  # ──────────────────────────────────────────────
  parameters:
    ItemId:
      name: id
      in: path
      required: true
      description: Identifiant de l'élément
      schema:
        type: string

    Fields:
      name: fields[]
      in: query
      description: Sélection de champs à retourner (pattern Directus)
      schema:
        type: array
        items:
          type: string
      style: form
      explode: true

    Filter:
      name: filter
      in: query
      description: 'Filtre JSON au format Directus (ex: {"actif":{"_eq":true}})'
      schema:
        type: string

    Limit:
      name: limit
      in: query
      description: Nombre maximum d'éléments à retourner
      schema:
        type: integer
        default: 10

  # ──────────────────────────────────────────────
  # Schemas
  # ──────────────────────────────────────────────
  schemas:
    # ── Configuration ──
    Configuration:
      type: object
      required: [id, key_dh, key_ms]
      properties:
        id:
          type: integer
        key_dh:
          type: string
          description: Token Bearer pour l'API FFBB (api.ffbb.app)
        key_ms:
          type: string
          description: Token Bearer pour Meilisearch (meilisearch-prod.ffbb.app)
        key_directus_website:
          type: string
          nullable: true
        key_directus_competitions:
          type: string
          nullable: true
        ios_version:
          type: string
          nullable: true
        android_version:
          type: string
          nullable: true
        date_created:
          type: string
          format: date-time
          nullable: true
        date_updated:
          type: string
          format: date-time
          nullable: true

    # ── Saison ──
    Saison:
      type: object
      required: [id]
      properties:
        id:
          type: string
        nom:
          type: string
          nullable: true
        actif:
          type: boolean
          nullable: true
        debut:
          type: string
          nullable: true
        fin:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
        libelle:
          type: string
          nullable: true
        enCours:
          type: boolean
          nullable: true

    # ── Competition ──
    Competition:
      type: object
      required: [id, nom, sexe, saison, code, typeCompetition, liveStat, competition_origine, competition_origine_nom, publicationInternet]
      properties:
        id:
          type: string
        nom:
          type: string
        sexe:
          type: string
        saison:
          type: string
        code:
          type: string
        typeCompetition:
          type: string
        liveStat:
          type: boolean
        competition_origine:
          type: string
        competition_origine_nom:
          type: string
        publicationInternet:
          type: string
        categorie:
          description: ID de la catégorie (string) ou objet expansé si fields[]=categorie.*
          oneOf:
            - type: string
            - $ref: '#/components/schemas/CompetitionCategorie'
        typeCompetitionGenerique:
          description: Code du type (string) ou objet expansé si fields[]=typeCompetitionGenerique.*
          oneOf:
            - type: string
            - $ref: '#/components/schemas/TypeCompetitionGenerique'
        logo: {}
        poules:
          type: array
          items:
            description: ID de la poule (string) ou objet expansé si fields[]=poules.*
            oneOf:
              - type: string
              - $ref: '#/components/schemas/CompetitionPouleRef'
        phases:
          type: array
          items:
            description: ID de la phase (string) ou objet expansé si fields[]=phases.*
            oneOf:
              - type: string
              - $ref: '#/components/schemas/Phase'

    CompetitionCategorie:
      type: object
      properties:
        code:
          type: string
        ordre:
          type: integer

    TypeCompetitionGenerique:
      type: object
      properties:
        logo:
          $ref: '#/components/schemas/Logo'

    Logo:
      type: object
      properties:
        id:
          type: string
        gradient_color:
          type: string

    CompetitionPouleRef:
      type: object
      properties:
        id:
          type: string
        nom:
          type: string

    Phase:
      type: object
      required: [id, nom, liveStat, phase_code]
      properties:
        id:
          type: string
        nom:
          type: string
        liveStat:
          type: boolean
        phase_code:
          type: string
        poules:
          type: array
          items:
            $ref: '#/components/schemas/PhasePoule'

    PhasePoule:
      type: object
      required: [id, nom]
      properties:
        id:
          type: string
        nom:
          type: string
        rencontres:
          type: array
          items:
            $ref: '#/components/schemas/Rencontre'
        engagements:
          type: array
          items:
            $ref: '#/components/schemas/PouleEngagement'

    PouleEngagement:
      type: object
      required: [id]
      properties:
        id:
          type: string
        idOrganisme:
          type: object
          properties:
            id:
              type: string

    Rencontre:
      type: object
      required: [id, numero, numeroJournee, idPoule, competitionId, resultatEquipe1, resultatEquipe2, joue, nomEquipe1, nomEquipe2, date_rencontre]
      properties:
        id:
          type: string
        numero:
          type: string
        numeroJournee:
          type: string
        idPoule:
          type: string
        competitionId:
          type: string
        resultatEquipe1:
          type: string
        resultatEquipe2:
          type: string
        joue:
          type: integer
        nomEquipe1:
          type: string
        nomEquipe2:
          type: string
        date_rencontre:
          type: string
          format: date-time
        idOrganismeEquipe1:
          type: object
          nullable: true
          properties:
            logo: {}
        idOrganismeEquipe2:
          type: object
          nullable: true
          properties:
            logo: {}
        gsId:
          $ref: '#/components/schemas/GameStats'
        idEngagementEquipe1:
          $ref: '#/components/schemas/RencontreEngagement'
        idEngagementEquipe2:
          $ref: '#/components/schemas/RencontreEngagement'
        salle:
          $ref: '#/components/schemas/RencontreSalle'
        officiels:
          type: array
          items:
            $ref: '#/components/schemas/Officiel'

    RencontreEngagement:
      type: object
      nullable: true
      properties:
        nom:
          type: string
        id:
          type: string
        nomOfficiel:
          type: string
        nomUsuel:
          type: string
        codeAbrege:
          type: string
        logo: {}

    GameStats:
      type: object
      nullable: true
      properties:
        matchId:
          type: string
          nullable: true
        currentStatus:
          type: string
          nullable: true
        currentPeriod:
          type: string
          nullable: true
        score_q1_home:
          type: integer
          nullable: true
        score_q2_home:
          type: integer
          nullable: true
        score_q3_home:
          type: integer
          nullable: true
        score_q4_home:
          type: integer
          nullable: true
        score_ot1_home:
          type: integer
          nullable: true
        score_ot2_home:
          type: integer
          nullable: true
        score_q1_out:
          type: integer
          nullable: true
        score_q2_out:
          type: integer
          nullable: true
        score_q3_out:
          type: integer
          nullable: true
        score_q4_out:
          type: integer
          nullable: true
        score_ot1_out:
          type: integer
          nullable: true
        score_ot2_out:
          type: integer
          nullable: true

    RencontreSalle:
      type: object
      nullable: true
      properties:
        id:
          type: string
        numero:
          type: string
        libelle:
          type: string
        libelle2:
          type: string
        adresse:
          type: string
        adresseComplement:
          type: string
        commune:
          $ref: '#/components/schemas/Commune'
        cartographie:
          $ref: '#/components/schemas/Cartographie'

    Officiel:
      type: object
      properties:
        ordre:
          type: integer
        fonction:
          type: object
          nullable: true
          properties:
            libelle:
              type: string
        officiel:
          type: object
          nullable: true
          properties:
            nom:
              type: string
            prenom:
              type: string

    # ── Poule ──
    Poule:
      type: object
      required: [id]
      properties:
        id:
          type: string
        nom:
          type: string
        id_competition:
          type: string
        rencontres:
          type: array
          items:
            description: ID de la rencontre (string) ou objet expansé si fields[]=rencontres.*
            oneOf:
              - type: string
              - $ref: '#/components/schemas/PouleRencontre'
        engagements:
          type: array
          items:
            type: string
        classements:
          type: array
          nullable: true
          items:
            description: ID du classement (string) ou objet expansé si fields[]=classements.*
            oneOf:
              - type: string
              - $ref: '#/components/schemas/TeamRanking'

    PouleRencontre:
      type: object
      required: [id, numero, numeroJournee, idPoule, competitionId, resultatEquipe1, resultatEquipe2, joue, nomEquipe1, nomEquipe2, date_rencontre]
      properties:
        id:
          type: string
        numero:
          type: string
        numeroJournee:
          type: string
        idPoule:
          type: string
        competitionId:
          type: string
        resultatEquipe1:
          type: string
        resultatEquipe2:
          type: string
        joue:
          type: integer
        nomEquipe1:
          type: string
        nomEquipe2:
          type: string
        date_rencontre:
          type: string
          format: date-time

    TeamRanking:
      type: object
      required: [id, position, points, matchJoues, gagnes, perdus, nombreForfaits, paniersMarques, paniersEncaisses, difference, quotient]
      properties:
        id:
          type: string
        idEngagement:
          $ref: '#/components/schemas/RankingEngagement'
        position:
          type: integer
        points:
          type: integer
        matchJoues:
          type: integer
        gagnes:
          type: integer
        perdus:
          type: integer
        nuls:
          type: integer
          nullable: true
        nombreForfaits:
          type: integer
        nombreDefauts:
          type: integer
          nullable: true
        paniersMarques:
          type: integer
        paniersEncaisses:
          type: integer
        difference:
          type: integer
        quotient:
          type: number
          format: double
        pointInitiaux:
          type: integer
          nullable: true
        penalitesArbitrage:
          type: integer
          nullable: true
        penalitesEntraineur:
          type: integer
          nullable: true
        penalitesDiverses:
          type: integer
          nullable: true
        horsClassement:
          type: boolean
          nullable: true
        organisme:
          type: object
          nullable: true
          properties:
            id:
              type: string
            nom:
              type: string
            nom_simple:
              type: string
              nullable: true
            logo:
              type: object
              nullable: true
              properties:
                id:
                  type: string
        idCompetition:
          type: string
          nullable: true
        idPoule:
          type: object
          nullable: true
          properties:
            id:
              type: string

    RankingEngagement:
      type: object
      nullable: true
      properties:
        id:
          type: string
        nomUsuel:
          type: string
          nullable: true
        logo:
          $ref: '#/components/schemas/Logo'

    # ── Organisme ──
    Organisme:
      type: object
      required: [id, nom, code, telephone, adresse, mail, type, urlSiteWeb, nomClubPro]
      properties:
        id:
          type: string
        nom:
          type: string
        code:
          type: string
        telephone:
          type: string
        adresse:
          type: string
        mail:
          type: string
        type:
          type: string
        nom_simple:
          type: string
          nullable: true
        urlSiteWeb:
          type: string
        nomClubPro:
          type: string
        adresseClubPro:
          type: string
          nullable: true
        commune:
          description: ID de la commune (string) ou objet expansé si fields[]=commune.*
          oneOf:
            - type: string
            - $ref: '#/components/schemas/Commune'
        cartographie:
          description: ID de la cartographie (string) ou objet expansé si fields[]=cartographie.*
          oneOf:
            - type: string
            - $ref: '#/components/schemas/Cartographie'
        communeClubPro:
          type: string
          nullable: true
        membres:
          type: array
          items:
            oneOf:
              - type: integer
              - $ref: '#/components/schemas/Membre'
        competitions:
          type: array
          items: {}
        engagements:
          type: array
          items:
            oneOf:
              - type: integer
              - $ref: '#/components/schemas/OrganismeEngagement'
        organismes_fils:
          type: array
          items: {}
        offresPratiques:
          type: array
          items:
            oneOf:
              - type: integer
              - $ref: '#/components/schemas/OffrePratique'
        labellisation:
          type: array
          items:
            oneOf:
              - type: integer
              - $ref: '#/components/schemas/Labellisation'
        salle:
          description: ID de la salle (string) ou objet expansé si fields[]=salle.*
          oneOf:
            - type: string
            - $ref: '#/components/schemas/OrganismeSalle'
        logo:
          $ref: '#/components/schemas/Logo'

    Commune:
      type: object
      nullable: true
      properties:
        codePostal:
          type: string
        libelle:
          type: string

    Cartographie:
      type: object
      nullable: true
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double

    Membre:
      type: object
      required: [id, nom, prenom, adresse1]
      properties:
        id:
          type: string
        nom:
          type: string
        prenom:
          type: string
        adresse1:
          type: string
        adresse2:
          type: string
          nullable: true
        codePostal:
          type: string
        ville:
          type: string
        mail:
          type: string
        telephoneFixe:
          type: string
          nullable: true
        telephonePortable:
          type: string
        codeFonction:
          type: string

    OrganismeEngagement:
      type: object
      required: [id]
      properties:
        id:
          type: string
        idPoule:
          type: object
          nullable: true
          properties:
            id:
              type: string
        idCompetition:
          $ref: '#/components/schemas/EngagementCompetition'

    EngagementCompetition:
      type: object
      nullable: true
      properties:
        id:
          type: string
        nom:
          type: string
        code:
          type: string
        sexe:
          type: string
        competition_origine:
          type: string
        competition_origine_nom:
          type: string
        competition_origine_niveau:
          type: integer
        typeCompetition:
          type: string
        logo: {}
        saison:
          type: object
          nullable: true
          properties:
            id:
              type: string
        idCompetitionPere:
          type: string
          nullable: true
        organisateur:
          type: object
          nullable: true
          properties:
            type:
              type: string
        typeCompetitionGenerique:
          description: Code du type (string) ou objet expansé
          oneOf:
            - type: string
            - $ref: '#/components/schemas/TypeCompetitionGenerique'
        categorie:
          description: ID de la catégorie (string) ou objet expansé
          oneOf:
            - type: string
            - $ref: '#/components/schemas/CompetitionCategorie'

    OffrePratique:
      type: object
      properties:
        ffbbserver_offres_pratiques_id:
          type: object
          nullable: true
          properties:
            id:
              type: string
            title:
              type: string
            categoriePratique:
              type: string
            typePratique:
              type: string

    Labellisation:
      type: object
      required: [id, debut, fin]
      properties:
        id:
          type: string
        debut:
          type: string
          format: date-time
        fin:
          type: string
          format: date-time
        idLabellisationProgramme:
          type: object
          nullable: true
          properties:
            id:
              type: string
            libelle:
              type: string
            labellisationLabel:
              type: string
            logo_vertical:
              type: string
              nullable: true

    OrganismeSalle:
      type: object
      nullable: true
      properties:
        id:
          type: string
        numero:
          type: string
        libelle:
          type: string
        libelle2:
          type: string
        adresse:
          type: string
        adresseComplement:
          type: string
        commune:
          $ref: '#/components/schemas/Commune'
        cartographie:
          $ref: '#/components/schemas/Cartographie'

    # ── Live ──
    Live:
      type: object
      properties:
        matchId:
          type: string
          nullable: true
        matchTime:
          type: string
          description: Date/heure du match au format ISO 8601 sans timezone (ex. 2026-02-15T15:15:00)
          nullable: true
        competitionAbgName:
          type: string
          nullable: true
        score_q1_home:
          type: integer
          nullable: true
        score_q2_home:
          type: integer
          nullable: true
        score_q3_home:
          type: integer
          nullable: true
        score_q4_home:
